includes:
  - path: params.json
  - path: website.yaml

servers:
  web3_sn:
    id: web3_sn
    type: sn
    host: "{{sn_host}}"
    boot_jwt: "{{sn_boot_jwt}}"
    owner_pkx: "{{sn_owner_pk}}"
    device_jwt: ["{{sn_device_jwt}}"]
    ip: "{{sn_ip}}"

  local_dns:
    type: local_dns
    file_path: local_dns.toml

  main_dns:
    id: main_dns
    type: dns
    hook_point:
      main:
        id: main
        priority: 1
        blocks:
          default:
            id: default
            priority: 1
            block: |
              call resolve ${REQ.name} ${REQ.record_type} local_dns && return;
              call resolve ${REQ.name} ${REQ.record_type} web3_sn && return;

  main_http:
    type: http
    hook_point:
      main:
        id: main
        priority: 1
        blocks:
          default:
            id: default
            priority: 1
            block: |
              eq ${REQ.host} "sn.{{sn_host}}" && match ${REQ.path} "/1.0/identifiers/*" && return "server web3_sn";
              eq ${REQ.host} "sn.{{sn_host}}" && return "server web3_sn";
              eq ${REQ.host} "web3.{{sn_host}}" && return "server web3_sn";
              map-create "QUESTION" && map-add "QUESTION" "dest_host" "${REQ.host}" && map-add "QUESTION" "method" "query_by_hostname";
              call qa "web3_sn" "QUESTION";
              match ${REQ.host} "*.*.web3.{{sn_host}}" && eq ${ANSWER.self_cert} "false" && return "error 503 self_cert_is_false_for_${REQ.host};_enable_self_cert_on_your_gateway";
              return "forward rtcp://${ANSWER.did_hostname}/:80";
stacks:
  dns_udp:
    bind: 0.0.0.0:53
    protocol: udp
    hook_point:
      main:
        id: main
        priority: 1
        blocks:
          default:
            id: default
            priority: 1
            block: |
              return "server main_dns";

  main_rtcp:
    bind: 0.0.0.0:2980
    protocol: rtcp
    key_path: ./sn_private_key.pem
    device_config_path: ./sn_device_config.json
    hook_point:
      main:
        id: main
        priority: 1
        blocks:
          default:
            id: default
            priority: 1
            # REQ里已经有了很多信息，所以直接设置 method 为 query_by_did 并调用 qa 来查询是否是认证设备
            block: |
              map-add "REQ" "method" "query_by_did"
              call qa "web3_sn" "REQ" && eq ${ANSWER.state} "active" && accept;
              reject;

    on_new_tunnel_hook_point:
      main:
        id: main
        priority: 1
        blocks:
          default:
            id: default
            priority: 1
            # 隧道建立时校验 source_device_id 是否为认证设备，只允许认证设备 keep-tunnel
            # 从转发的角度，也支持所有device.owner是合法用户的连接
            block: |
              map-add "REQ" "method" "query_by_did"
              call qa "web3_sn" "REQ" && eq ${ANSWER.state} "active" && accept;
              reject;

  main_http_tcp:
    bind: 0.0.0.0:80
    protocol: tcp
    hook_point:
      main:
        id: main
        priority: 1
        blocks:
          default:
            id: default
            priority: 1
            block: |
              return "server main_http";
  
  main_tls:
    bind: 0.0.0.0:3443
    protocol: tls
    certs:
      - domain: "sn.{{sn_host}}"
        cert_path: ./{{sn_cer}}
        key_path: ./{{sn_pem}}
      - domain: "*.web3.{{sn_host}}"
        cert_path: ./{{web3_cer}}
        key_path: ./{{web3_pem}}
    hook_point:
      main:
        id: main
        priority: 1
        blocks:
          default:
            id: default
            priority: 1
            block: |
              return "server main_http";

  tls_raw_forward:
    bind: 0.0.0.0:443
    protocol: tcp
    hook_point:
      main:
        id: main
        priority: 1
        blocks:
          default:
            id: default
            priority: 1
            block: |
              call https-sni-probe || reject; 
              map-create "REQ.ext";
              map-add "REQ.ext" "proxy_source_addr" "${REQ.source_addr}";
              eq ${REQ.dest_host} "sn.{{sn_host}}" && return "forward tcp:///:3443";
              eq ${REQ.dest_host} "www.{{sn_host}}" && return "forward tcp:///:3443";
              eq ${REQ.dest_host} "{{sn_host}}" && return "forward tcp:///:3443";
              eq ${REQ.dest_host} "web3.{{sn_host}}" && return "forward tcp:///:3443";
              map-create "QUESTION" && map-add "QUESTION" "dest_host" "${REQ.dest_host}" && map-add "QUESTION" "method" "query_by_hostname";
              call qa "web3_sn" "QUESTION";
              eq ${ANSWER.self_cert} "true" && return "forward rtcp://${ANSWER.did_hostname}/:443";
              match ${REQ.dest_host} "*.*.web3.{{sn_host}}" && eq ${ANSWER.self_cert} "false" && error --from chain "self_cert=false for ${REQ.dest_host}; enable self_cert to use nested web3 host over HTTPS";
              match ${REQ.dest_host} "*.web3.{{sn_host}}" && return "forward tcp:///:3443";
              reject;
  
