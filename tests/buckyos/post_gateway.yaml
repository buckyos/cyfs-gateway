
stacks:
  zone_gateway_https:
    bind: 0.0.0.0:443
    protocol: tls
    certs:
      - domain: "test.buckyos.io"
        cert_path: ./zone_cert.cert
        key_path: ./zone_cert_key.pem
      - domain: "*.test.buckyos.io"
        cert_path: ./zone_cert.cert
        key_path: ./zone_cert_key.pem
    hook_point:
      main:
        id: main
        priority: 1
        blocks:
          default:
            id: default
            priority: 1
            block: |
              return "server node_gateway";
    